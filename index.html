<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战 Tank Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🛡️ 坦克大战 Tank Battle</h1>
            <div class="hud">
                <div class="hud-item">
                    <span class="label">分数</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="hud-item">
                    <span class="label">生命</span>
                    <span id="lives" class="value">3</span>
                </div>
                <div class="hud-item">
                    <span class="label">关卡</span>
                    <span id="level" class="value">1</span>
                </div>
                <div class="hud-item">
                    <span class="label">剩余敌人</span>
                    <span id="enemies-left" class="value">10</span>
                </div>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="640" height="640"></canvas>
            <div id="overlay" class="overlay">
                <div id="overlay-content" class="overlay-content">
                    <h2 id="overlay-title">坦克大战</h2>
                    <p id="overlay-message">
                        使用 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 或方向键移动<br>
                        按 <kbd>空格</kbd> 发射炮弹<br>
                        按 <kbd>P</kbd> 暂停游戏<br><br>
                        保护你的基地 🦅，消灭所有敌方坦克!
                    </p>
                    <button id="start-btn" class="btn">开始游戏</button>
                </div>
            </div>
        </div>

        <div class="controls-info">
            <div class="controls-section">
                <h3>🎮 操作说明</h3>
                <p><kbd>WASD</kbd> / <kbd>↑↓←→</kbd> 移动坦克</p>
                <p><kbd>空格</kbd> 发射炮弹</p>
                <p><kbd>P</kbd> 暂停/继续</p>
                <p><kbd>R</kbd> 重新开始</p>
            </div>
            <div class="controls-section">
                <h3>🎯 游戏目标</h3>
                <p>• 消灭所有敌方坦克</p>
                <p>• 保护基地不被摧毁</p>
                <p>• 砖墙可破坏，钢墙不可破坏</p>
                <p>• 收集道具获得增益</p>
            </div>
            <div class="controls-section">
                <h3>⭐ 道具说明</h3>
                <p>⭐ 升级：增强火力</p>
                <p>❤️ 生命：增加1条命</p>
                <p>🛡️ 护盾：临时无敌</p>
                <p>💣 炸弹：清除所有敌人</p>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
